<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #1a1a1a; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; }
#main-row { display: flex; flex: 1; min-height: 0; }
#editor-wrap { flex: 1; min-width: 0; }
#preview-panel {
  width: 320px; min-width: 200px; max-width: 600px;
  background: #111; border-left: 1px solid #333;
  display: flex; flex-direction: column; overflow: hidden; position: relative; flex-shrink: 0;
}
#preview-resize {
  position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
  cursor: col-resize; z-index: 10; background: transparent;
}
#preview-resize:hover, #preview-resize.dragging { background: #444; }
#preview-header {
  padding: 6px 12px; background: #1e1e1e; border-bottom: 1px solid #333;
  font-family: Consolas, monospace; font-size: 12px; color: #888;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; user-select: none;
}
#preview-canvas-wrap { flex: 1; min-height: 0; position: relative; overflow: hidden; }
#preview-canvas { display: block; }
#preview-controls {
  padding: 6px 10px; background: #1a1a1a; border-top: 1px solid #333;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
#preview-controls button {
  background: none; border: 1px solid #444; color: #888;
  font-family: Consolas, monospace; font-size: 11px; padding: 2px 10px;
  cursor: pointer; border-radius: 3px;
}
#preview-controls button:hover { background: #2a2a2a; color: #abb2bf; border-color: #555; }
#preview-controls button.active { background: #2a4a2a; color: #7ec07e; border-color: #5a8a5a; }
#preview-time { font-family: Consolas, monospace; font-size: 11px; color: #666; margin-left: auto; white-space: nowrap; }
#preview-scrubber { flex: 1; min-width: 40px; accent-color: #61afef; }
#error-panel {
  height: 140px; background: #111; border-top: 1px solid #333;
  display: flex; flex-direction: column; overflow: hidden;
}
#error-header {
  padding: 6px 12px; background: #1e1e1e; border-bottom: 1px solid #333;
  font-family: Consolas, monospace; font-size: 12px; color: #888;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
#error-count { color: #db3240; font-weight: 600; }
.hdr-btn {
  background: none; border: 1px solid #444; color: #888;
  font-family: Consolas, monospace; font-size: 11px; padding: 1px 8px;
  cursor: pointer; border-radius: 3px;
}
.hdr-btn:hover { background: #2a2a2a; color: #abb2bf; border-color: #555; }
#error-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.err-row {
  display: grid; grid-template-columns: 28px 60px 60px 1fr;
  padding: 3px 12px; font-family: Consolas, monospace; font-size: 12px;
  cursor: pointer; gap: 8px; align-items: center;
}
.err-row:hover { background: #1e1e1e; }
.err-icon { text-align: center; font-size: 11px; }
.err-icon.error { color: #e06c75; }
.err-icon.warning { color: #e5c07b; }
.err-icon.hint { color: #61afef; }
.err-pos { color: #666; }
.err-msg { color: #abb2bf; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#no-errors { padding: 8px 12px; font-family: Consolas, monospace; font-size: 12px; color: #4a4a4a; }
</style>
</head>
<body>
<div id="app">
  <div id="main-row">
    <div id="editor-wrap"></div>
    <div id="preview-panel">
      <div id="preview-resize"></div>
      <div id="preview-header">
        <span>2d preview</span>
        <span style="color:#61afef;margin-left:4px;font-size:11px;">z / x plane</span>
        <span style="margin-left:auto;color:#444;font-size:11px;">drag edge to resize</span>
      </div>
      <div id="preview-canvas-wrap">
        <canvas id="preview-canvas"></canvas>
      </div>
      <div id="preview-controls">
        <button id="btn-play" class="active">pause</button>
        <button id="btn-reset-anim">reset</button>
        <input type="range" id="preview-scrubber" min="0" max="10" value="0" step="0.01">
        <span id="preview-time">0.0s</span>
      </div>
    </div>
  </div>
  <div id="error-panel">
    <div id="error-header">
      <span>errors</span>
      <span id="error-count">0 errors</span>
      <span style="margin-left: auto; display: flex; gap: 6px; align-items: center;">
        <button class="hdr-btn" id="btn-import">Import</button>
        <button class="hdr-btn" id="btn-export">Export</button>
        <span style="color: #666;">made with claude</span>
      </span>
    </div>
    <div id="error-list"><div id="no-errors">no errors</div></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs/loader.min.js"></script>
<script>
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs' } });
require(['vs/editor/editor.main'], function () {

  const LANG = 'cmdLang';
  const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
  const VAR_RE  = /^%[a-zA-Z_]\w*$/;
  function isValidUID(val) { return UUID_RE.test(val) || VAR_RE.test(val); }

  const VEHICLE_ENUM    = ['GroundVehicle','Motar','Obj','RPG7v2','Mine','Flash','Breach','Igla','C4','HelicopterVehicle','Grenade','None'];
  const TRIGGER_SUB     = ['add','remove','color','set','activate','reset','create','delete','executable','whitelist'];
  const WORLD_SUB       = ['list','load'];
  const TIME_SUB        = ['start','stop','now','set'];
  const FILE_SUB        = ['save','load','delete','loadcopy','savecopy','list','savemodel','deletemodel','insertmodel'];
  const PART_TYPES      = ['part','wedge','corner','cylinder','ball'];
  const WHITELIST_TYPES = ['Players','Bots','Helicopters','Ground'];
  const MATERIALS       = ["asphalt_rough","asphalt_snow","asphalt_snow2","asphalt_snow_paint","asphalt_worn1","asphalt_worn2","asphalt_worn3","brick_clad","brick_clad2","brick_clad3","brick_clad4","brick_clad5","brick_clad5_clean","brick_clad6","brick_clad7","brick_clad8","brick_clad9","brick_clad10","brick_clad11","brick_default_dirty","brick_default_dirty2","brick_desert","brick_maya1","brick_maya2","brick_maya3","brick_maya4","brick_modern","brick_old","brick_old2","brick_rough","cobble_rubble1","cobble_rubble2","cobblestone_rocks1","concrete_ceiling","concrete_ceiling2","concrete_clad","concrete_clad2","concrete_clad_dirty","concrete_default_dirty","concrete_drywall","concrete_plaster1","concrete_plaster2","concrete_plaster2_stained","concrete_plaster3","concrete_plaster4","concrete_plaster5","concrete_plaster6","concrete_plaster7","concrete_plaster8","concrete_plate","concrete_plate2","concrete_roof","concrete_roof2","concrete_roof3","concrete_rough","concrete_shingle","concrete_slatetiles","concrete_sleepers","concrete_sleepers_stained","concrete_stucco","concrete_tile","concrete_tile2","concrete_tile2_snow","concrete_tile3","concrete_tile4","concrete_tile5","concrete_tile5_snow","concrete_tile5_snow2","concrete_tile6","concrete_worn","concrete_worn2","concrete_worn3","concrete_worn4","concrete_worn4_snow","corrodedmetal_rust","corrodedmetal_rust2","corrodedmetal_rust3","corrodedmetal_rust3_snow","corrodedmetal_sheets","corrodedmetal_sheets2","corrodedmetal_sheets3","diamondplate_oldthread","fabric_carpet1","fabric_carpet2","fabric_carpet3","fabric_worn1","glass_broken","grass_tropical","ground_dirt","ground_dirt2","leafygrass_grass","leafygrass_lawn","leather_zombie_1","marble_bigtiles","marble_checker","marble_polished","marble_polished2","marble_polished3","marble_smalltiles","marble_smalltiles2","marble_smalltiles2_dirty","marble_smalltiles3","marble_tiles","marble_tiles2","marble_tiles3","marble_tiles4","marble_tiles5","marble_tiles6","marble_tiles7","marble_tiles8","marble_tiles9","marble_tiles10","marble_tiles11","marble_tiles12","marble_vinyltile","marble_vinyltile_stained","marble_whiterectangle","metal_clad","metal_corrugated","metal_corrugated2","metal_corrugated3","metal_corrugated4","metal_corrugated5","metal_corrugated6","metal_dented","metal_diamondsheet","metal_painted","metal_siding","metal_worn","metal_worn2","metal_worn2_snow1","metal_worn2_snow2","mud_ground1","mud_ground1_snow","mud_tropical","pebble_gravel1","plastic_cautiontape","plastic_cautiontape2","plastic_tactile","plastic_tactile_snow","plastic_tarp","plastic_trash","plastic_trashbags","plastic_worn1","rock_cliff","rock_cliff2","rock_cliff3","rock_tropical1","rock_tropical2","sand_road1","sand_road2","sand_tropical","sand_tropical2","sand_tropical3","sand_tropical4","wood_bark1","wood_bark2","wood_bark3","wood_bark4","wood_bark5","wood_compositedeck","wood_log","wood_painted","wood_painted2","wood_particleboard","wood_particleboard2","wood_polished","wood_shingle1","wood_siding","wood_sliding2","wood_sliding3","wood_sliding4","wood_sliding5","wood_sliding6","wood_sliding6_snow2","woodplanks_fancyfloor","woodplanks_fancyfloor2","woodplanks_fancyfloor3","woodplanks_fancyfloor4","woodplanks_laminate","woodplanks_laminate2","woodplanks_laminate3","woodplanks_laminate4","woodplanks_plyplates"];

  const CMDS = {
    create:    { params: [{name:'world',type:'number',default:1},{name:'type',type:'enum',values:PART_TYPES},{name:'pX',type:'number'},{name:'pY',type:'number'},{name:'pZ',type:'number'}], doc: 'Spawn an object in the given world at position (pX, pY, pZ).' },
    tween:     { params: [{name:'world',type:'number',default:1},{name:'pUID',type:'uid'},{name:'duration',type:'number'},{name:'pX',type:'number'},{name:'pY',type:'number'},{name:'pZ',type:'number'},{name:'rX',type:'number'},{name:'rY',type:'number'},{name:'rZ',type:'number'}], doc: 'Animate object pUID to position and rotation over duration seconds.' },
    color:     { params: [{name:'world',type:'number',default:1},{name:'pUID',type:'uid'},{name:'r',type:'number'},{name:'g',type:'number'},{name:'b',type:'number'}], doc: 'Set the colour of object pUID using RGB values (0-255).' },
    material:  { params: [{name:'world',type:'number',default:1},{name:'pUID',type:'uid'},{name:'material',type:'enum',values:MATERIALS}], doc: 'Apply a material to part pUID.' },
    reset:     { params: [], doc: 'Reset the entire scene to its default state.' },
    explosion: { params: [{name:'radius',type:'number'},{name:'damage',type:'number'},{name:'pX',type:'number'},{name:'pY',type:'number'},{name:'pZ',type:'number'},{name:'target',type:'enum',values:VEHICLE_ENUM}], doc: 'Trigger an explosion at (pX, pY, pZ) with given type.' },
    move:      { params: [{name:'world',type:'number',default:1},{name:'pUID',type:'uid'},{name:'pX',type:'number'},{name:'pY',type:'number'},{name:'pZ',type:'number'},{name:'rX',type:'number'},{name:'rY',type:'number'},{name:'rZ',type:'number'}], doc: 'Moves / rotates a given part.' },
    size:      { params: [{name:'world',type:'number',default:1},{name:'pUID',type:'uid'},{name:'sX',type:'number'},{name:'sY',type:'number'},{name:'sZ',type:'number'}], doc: 'Resize given part with given parameters.' },
    wait:      { params: [{name:'duration',type:'number'}], doc: 'Waits a set duration before proceeding.' },
    ban:       { params: [{name:'player',type:'string'}], doc: 'Bans specified player.' },
    kick:      { params: [{name:'player',type:'string'}], doc: 'Kicks specified player.' },
    duplicate: { params: [{name:'world',type:'number'},{name:'pUID',type:'uid'}], doc: 'Duplicates specified part.' },
    trigger: {
      params: [{name:'subtype',type:'enum',values:TRIGGER_SUB}],
      subtypes: {
        add:        { params: [{name:'world',type:'number'},{name:'uID',type:'uid'}], doc: 'Adds trigger to specified part.' },
        remove:     { params: [{name:'world',type:'number'},{name:'uID',type:'uid'}], doc: 'Removes trigger from specified part.' },
        color:      { params: [{name:'world',type:'number'},{name:'triggerName',type:'string'},{name:'r',type:'number'},{name:'g',type:'number'},{name:'b',type:'number'}], doc: 'Changes trigger hitbox color.' },
        set:        { params: [{name:'world',type:'number'},{name:'uID',type:'uid'},{name:'triggerName',type:'string'},{name:'boolean',type:'enum',values:['true','false']}], doc: 'Applies specified trigger to specified part.' },
        activate:   { params: [{name:'world',type:'number'},{name:'triggerName',type:'string'}], doc: 'Activates specified trigger.' },
        reset:      { params: [{name:'world',type:'number'},{name:'triggerName',type:'string'}], doc: 'Resets specified trigger.' },
        create:     { params: [{name:'world',type:'number'},{name:'name',type:'string'}], doc: 'Creates a new trigger.' },
        delete:     { params: [{name:'world',type:'number'},{name:'triggerName',type:'string'}], doc: 'Deletes specified trigger.' },
        executable: { params: [{name:'world',type:'number'},{name:'triggerName',type:'string'},{name:'line',type:'number'},{name:'command',type:'command'}], doc: 'Adds a command to specified line of a specified trigger.' },
        whitelist:  { params: [{name:'world',type:'number'},{name:'triggerName',type:'string'},{name:'whitelist',type:'enum',values:WHITELIST_TYPES},{name:'boolean',type:'enum',values:['true','false']}], doc: 'Manages trigger whitelist.' },
      },
      doc: 'Create, edit and add things to triggers.',
    },
    world: {
      params: [{name:'subtype',type:'enum',values:WORLD_SUB}],
      subtypes: {
        list: { params: [], doc: 'Lists all available worlds.' },
        load: { params: [{name:'savefile',type:'string'},{name:'world',type:'number'}], doc: 'Loads a world from a savefile.' },
      },
      doc: 'Load or list worlds.',
    },
    time: {
      params: [{name:'subtype',type:'enum',values:TIME_SUB}],
      subtypes: {
        start: { params: [], doc: 'Starts the time cycle.' },
        stop:  { params: [], doc: 'Stops the time cycle.' },
        now:   { params: [], doc: 'Returns the current time.' },
        set:   { params: [{name:'time',type:'number'}], doc: 'Sets the time to a specific value.' },
      },
      doc: 'Become a time traveller.',
    },
    file: {
      params: [{name:'subtype',type:'enum',values:FILE_SUB}],
      subtypes: {
        save:        { params: [{name:'name',type:'string'}], doc: 'Saves the current map.' },
        load:        { params: [{name:'name',type:'string'}], doc: 'Loads a map file.' },
        delete:      { params: [{name:'name',type:'string'}], doc: 'Deletes a map file.' },
        loadcopy:    { params: [{name:'name',type:'string'}], doc: 'Loads a copy of a map file.' },
        savecopy:    { params: [{name:'name',type:'string'}], doc: 'Saves a copy of the current map.' },
        list:        { params: [], doc: 'Lists all available files.' },
        savemodel:   { params: [{name:'name',type:'string'},{name:'world',type:'number'},{name:'uID',type:'uid'}], doc: 'Saves a part as a model.' },
        deletemodel: { params: [{name:'name',type:'string'}], doc: 'Deletes a model file.' },
        insertmodel: { params: [{name:'world',type:'number'},{name:'name',type:'string'},{name:'pX',type:'number'},{name:'pY',type:'number'},{name:'pZ',type:'number'},{name:'r',type:'number'}], doc: 'Inserts a model into the world.' },
      },
      doc: 'Edit map and model files.',
    },
  };

  monaco.languages.register({ id: LANG });
  monaco.languages.setMonarchTokensProvider(LANG, {
    tokenizer: {
      root: [
        [/\b(create|tween|color|material|reset|explosion|move|size|trigger|wait|ban|kick|duplicate|world|time|file)\b/, 'keyword'],
        [/\b(true|false)\b/, 'constant'],
        [/%[a-zA-Z_]\w*/, 'type'],
        [new RegExp('\\b(' + [...VEHICLE_ENUM,...TRIGGER_SUB,...TIME_SUB,...WORLD_SUB,...FILE_SUB,...PART_TYPES,...MATERIALS].join('|') + ')\\b'), 'string'],
        [/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i, 'type'],
        [/-?\d+(\.\d+)?/, 'number'],
        [/"[^"]*"/, 'string'],
        [/'[^']*'/, 'string'],
      ]
    }
  });

  function parseLine(line) {
    const trimmed = line.trimStart();
    const leadingSpaces = line.length - trimmed.length;
    const tokens = [];
    let i = 0;
    while (i < trimmed.length) {
      if (trimmed[i] === ' ') { i++; continue; }
      const start = i;
      while (i < trimmed.length && trimmed[i] !== ' ') i++;
      tokens.push({ value: trimmed.slice(start, i), col: leadingSpaces + start + 1 });
    }
    return tokens;
  }

  function getRestParamIndex(params) { return params.findIndex(p => p.type === 'command'); }

  function parseLineWithRest(line, restTokenIdx) {
    const tokens = parseLine(line);
    if (restTokenIdx < 0 || tokens.length <= restTokenIdx) return tokens;
    const restCol = tokens[restTokenIdx].col;
    return [...tokens.slice(0, restTokenIdx), { value: line.slice(restCol - 1), col: restCol, isRest: true }];
  }

  function getTokens(line) {
    const raw = parseLine(line);
    if (!raw.length) return raw;
    const spec = CMDS[raw[0].value.toLowerCase()];
    if (!spec) return raw;
    const params = resolveParams(spec, raw);
    const restIdx = getRestParamIndex(params);
    if (restIdx < 0) return raw;
    return parseLineWithRest(line, restIdx + 1);
  }

  function resolveParams(spec, tokens) {
    if (!spec.subtypes) return spec.params;
    const subtypeVal = tokens[1] ? tokens[1].value : null;
    const sub = subtypeVal && spec.subtypes[subtypeVal];
    const extra = sub ? (sub.params ?? sub) : [];
    return [...spec.params, ...extra];
  }

  function getActiveParamIndex(tokens, cursorCol) {
    let paramIdx = -1;
    for (let i = 0; i < tokens.length; i++) {
      if (tokens[i].col <= cursorCol) paramIdx = i - 1;
    }
    const last = tokens[tokens.length - 1];
    if (last && cursorCol > last.col + last.value.length) paramIdx = tokens.length - 1;
    return Math.max(0, paramIdx);
  }

  function paramLabel(p) {
    if (p.type === 'enum')    return `${p.name}: ${p.values.slice(0,5).join('|')}${p.values.length > 5 ? '|...' : ''}`;
    if (p.type === 'uid')     return `${p.name}: uid`;
    if (p.type === 'command') return `${p.name}: <command>`;
    let label = `${p.name}: ${p.type}`;
    if (p.default !== undefined) label += ` = ${p.default}`;
    return label;
  }

  function paramDoc(p) {
    if (p.type === 'enum')    return { value: `Valid values:\n${p.values.map(v => '- ' + v).join('\n')}` };
    if (p.type === 'uid')     return { value: 'Expected format: `xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx` or `%variableName`' };
    if (p.type === 'command') return { value: `A full command to execute.\nValid commands: ${Object.keys(CMDS).join(', ')}` };
    return { value: `Type: ${p.type}` };
  }

  function nestedCommandSuggestions(nestedText, cursorCol, range) {
    const textUpToCursor = nestedText.slice(0, cursorCol);
    const tokensUpToCursor = parseLine(textUpToCursor);
    if (!tokensUpToCursor.length || (tokensUpToCursor.length === 1 && !textUpToCursor.endsWith(' '))) {
      return Object.entries(CMDS).map(([name, spec]) => ({
        label: name, kind: monaco.languages.CompletionItemKind.Function,
        detail: spec.params.map(p => p.name).join(' '), documentation: { value: spec.doc },
        insertText: name, range
      }));
    }
    const nestedSpec = CMDS[tokensUpToCursor[0].value.toLowerCase()];
    if (!nestedSpec) return [];
    const nestedParams = resolveParams(nestedSpec, tokensUpToCursor);
    const paramIdx = textUpToCursor.endsWith(' ') ? tokensUpToCursor.length - 1 : tokensUpToCursor.length - 2;
    if (paramIdx < 0 || paramIdx >= nestedParams.length) return [];
    const param = nestedParams[paramIdx];
    if (param.type !== 'enum') return [];
    return param.values.map(v => ({ label: v, kind: monaco.languages.CompletionItemKind.EnumMember, insertText: v, range }));
  }

  function nestedCommandSignature(nestedText, cursorCol, outerCmdName) {
    const tokens = parseLine(nestedText);
    if (!tokens.length) return null;
    const spec = CMDS[tokens[0].value.toLowerCase()];
    if (!spec) return null;
    const params = resolveParams(spec, tokens);
    if (!params.length) return null;
    const activeParam = getActiveParamIndex(parseLine(nestedText.slice(0, cursorCol)), cursorCol);
    const paramLabels = params.map(paramLabel);
    return {
      value: {
        signatures: [{ label: `[${outerCmdName}] ${tokens[0].value}  ${paramLabels.join('  ')}`, documentation: { value: spec.doc },
          parameters: params.map((p, idx) => ({ label: paramLabels[idx], documentation: paramDoc(p) })) }],
        activeSignature: 0, activeParameter: Math.min(activeParam, params.length - 1)
      }, dispose() {}
    };
  }

  monaco.languages.registerSignatureHelpProvider(LANG, {
    signatureHelpTriggerCharacters: [' ', '\t'],
    signatureHelpRetriggerCharacters: [' '],
    provideSignatureHelp(model, position) {
      const line = model.getLineContent(position.lineNumber);
      const tokens = getTokens(line);
      if (!tokens.length) return null;
      const cmdName = tokens[0].value.toLowerCase();
      const spec = CMDS[cmdName];
      if (!spec) return null;
      const params = resolveParams(spec, tokens);
      if (!params.length) return null;
      const activeParam = getActiveParamIndex(tokens, position.column);
      const currentParam = params[Math.min(activeParam, params.length - 1)];
      if (currentParam && currentParam.type === 'command') {
        const restToken = tokens.find(t => t.isRest);
        if (restToken) return nestedCommandSignature(restToken.value, position.column - restToken.col, cmdName);
      }
      const paramLabels = params.map(paramLabel);
      return {
        value: {
          signatures: [{ label: `${cmdName}  ${paramLabels.join('  ')}`, documentation: { value: spec.doc },
            parameters: params.map((p, idx) => ({ label: paramLabels[idx], documentation: paramDoc(p) })) }],
          activeSignature: 0, activeParameter: Math.min(activeParam, params.length - 1)
        }, dispose() {}
      };
    }
  });

  monaco.languages.registerCompletionItemProvider(LANG, {
    triggerCharacters: [' ', '\t'],
    provideCompletionItems(model, position) {
      const line = model.getLineContent(position.lineNumber);
      const textBefore = line.slice(0, position.column - 1);
      const rawTokensBefore = parseLine(textBefore);
      const wordInfo = model.getWordUntilPosition(position);
      const range = {
        startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
        startColumn: wordInfo.startColumn || position.column, endColumn: wordInfo.endColumn || position.column
      };
      if (!rawTokensBefore.length || (rawTokensBefore.length === 1 && !textBefore.endsWith(' '))) {
        return { suggestions: Object.entries(CMDS).map(([name, spec]) => ({
          label: name, kind: monaco.languages.CompletionItemKind.Function,
          detail: spec.params.map(p => p.name).join(' '), documentation: { value: spec.doc }, insertText: name, range
        })) };
      }
      const cmdName = rawTokensBefore[0].value.toLowerCase();
      const spec = CMDS[cmdName];
      if (!spec) return { suggestions: [] };
      const params = resolveParams(spec, rawTokensBefore);
      const restIdx = getRestParamIndex(params);
      if (restIdx >= 0) {
        const restTokenIdx = restIdx + 1;
        const rawAll = parseLine(textBefore);
        if (rawAll.length > restTokenIdx || (rawAll.length === restTokenIdx && textBefore.endsWith(' '))) {
          const restTokens = rawAll.slice(restTokenIdx);
          let nestedText = '', cursorInNested = 0;
          if (restTokens.length > 0) {
            nestedText = textBefore.slice(restTokens[0].col - 1);
            cursorInNested = nestedText.length;
          }
          return { suggestions: nestedCommandSuggestions(nestedText, cursorInNested, range) };
        }
      }
      const paramIdx = textBefore.endsWith(' ') ? rawTokensBefore.length - 1 : rawTokensBefore.length - 2;
      if (paramIdx < 0 || paramIdx >= params.length) return { suggestions: [] };
      const param = params[paramIdx];
      if (param.type !== 'enum') return { suggestions: [] };
      return { suggestions: param.values.map(v => ({ label: v, kind: monaco.languages.CompletionItemKind.EnumMember, insertText: v, range })) };
    }
  });

  monaco.languages.registerHoverProvider(LANG, {
    provideHover(model, position) {
      const line = model.getLineContent(position.lineNumber);
      const tokens = getTokens(line);
      if (!tokens.length) return null;
      const word = model.getWordAtPosition(position);
      if (!word) return null;
      const cmdName = tokens[0].value.toLowerCase();
      if (word.word.toLowerCase() === cmdName) {
        const spec = CMDS[cmdName];
        if (!spec) return null;
        return { contents: [{ value: `**${cmdName}** ${spec.params.map(p => p.name).join(' ')}` }, { value: spec.doc }] };
      }
      const spec = CMDS[cmdName];
      if (!spec) return null;
      const params = resolveParams(spec, tokens);
      const tokIdx = tokens.findIndex(t => t.col <= position.column && position.column <= t.col + t.value.length);
      if (tokIdx <= 0) return null;
      const param = params[tokIdx - 1];
      if (!param) return null;
      if (param.type === 'command' && tokens[tokIdx].isRest) {
        const restToken = tokens[tokIdx];
        const offsetInRest = position.column - restToken.col;
        const nestedTokens = parseLine(restToken.value);
        if (nestedTokens.length) {
          const nestedSpec = CMDS[nestedTokens[0].value.toLowerCase()];
          if (nestedSpec) {
            const nestedTokIdx = nestedTokens.findIndex(t => t.col - 1 <= offsetInRest && offsetInRest <= t.col - 1 + t.value.length);
            if (nestedTokIdx === 0) return { contents: [{ value: `**${nestedTokens[0].value}** (nested)` }, { value: nestedSpec.doc }] };
            if (nestedTokIdx > 0) {
              const np = resolveParams(nestedSpec, nestedTokens)[nestedTokIdx - 1];
              if (np) return { contents: [{ value: `**${np.name}** — \`${np.type}\`` }, paramDoc(np)] };
            }
          }
        }
      }
      const header = `**${param.name}** — \`${param.type}\`` + (param.default !== undefined ? ` (default: \`${param.default}\`)` : '');
      return { contents: [{ value: header }, paramDoc(param)] };
    }
  });

  monaco.languages.registerInlayHintsProvider(LANG, {
    provideInlayHints(model) {
      const hints = [];
      for (let ln = 1; ln <= model.getLineCount(); ln++) {
        const line = model.getLineContent(ln);
        const tokens = getTokens(line);
        if (!tokens.length) continue;
        const cmdName = tokens[0].value.toLowerCase();
        const spec = CMDS[cmdName];
        if (!spec) continue;
        const params = resolveParams(spec, tokens);
        const args = tokens.slice(1);
        args.forEach((arg, i) => {
          if (i >= params.length) return;
          hints.push({
            kind: monaco.languages.InlayHintKind.Parameter,
            position: { lineNumber: ln, column: arg.col },
            label: params[i].name + ':',
            paddingRight: true,
          });
        });
      }
      return { hints, dispose() {} };
    }
  });

  let currentMarkers = [];
  function severityLabel(s) {
    if (s === monaco.MarkerSeverity.Error)   return { label: 'x', cls: 'error',   text: 'error' };
    if (s === monaco.MarkerSeverity.Warning) return { label: '!', cls: 'warning', text: 'warning' };
    return { label: 'i', cls: 'hint', text: 'hint' };
  }

  function updateErrorPanel(markers, editorRef) {
    currentMarkers = markers;
    const list = document.getElementById('error-list');
    const count = document.getElementById('error-count');
    const errors = markers.filter(m => m.severity === monaco.MarkerSeverity.Error).length;
    const warnings = markers.filter(m => m.severity === monaco.MarkerSeverity.Warning).length;
    let countStr = '';
    if (errors)   countStr += `${errors} error${errors>1?'s':''}`;
    if (warnings) countStr += (countStr ? ', ' : '') + `${warnings} warning${warnings>1?'s':''}`;
    count.textContent = countStr || '0 errors';
    count.style.color = errors ? '#e06c75' : warnings ? '#e5c07b' : '#4a4a4a';
    if (!markers.length) { list.innerHTML = '<div id="no-errors">no errors</div>'; return; }
    list.innerHTML = markers.map((m, i) => {
      const s = severityLabel(m.severity);
      const msg = m.message.replace(/\n/g, ' ');
      return `<div class="err-row" data-idx="${i}"><span class="err-icon ${s.cls}">${s.label}</span><span class="err-pos">Ln ${m.startLineNumber}</span><span class="err-pos">Col ${m.startColumn}</span><span class="err-msg" title="${msg}">[${s.text}] ${msg}</span></div>`;
    }).join('');
    list.querySelectorAll('.err-row').forEach(row => {
      row.addEventListener('click', () => {
        const m = currentMarkers[+row.dataset.idx];
        editorRef.setPosition({ lineNumber: m.startLineNumber, column: m.startColumn });
        editorRef.revealLineInCenter(m.startLineNumber);
        editorRef.focus();
      });
    });
  }

  function validate(model, editorRef) {
    const markers = [];
    for (let ln = 1; ln <= model.getLineCount(); ln++) {
      const line = model.getLineContent(ln);
      const tokens = getTokens(line);
      if (!tokens.length) continue;
      const cmdName = tokens[0].value.toLowerCase();
      const spec = CMDS[cmdName];
      if (!spec) {
        markers.push({ severity: monaco.MarkerSeverity.Error, message: `Unknown command "${tokens[0].value}"`, startLineNumber: ln, endLineNumber: ln, startColumn: tokens[0].col, endColumn: tokens[0].col + tokens[0].value.length });
        continue;
      }
      const params = resolveParams(spec, tokens);
      const args = tokens.slice(1);
      for (let i = 0; i < args.length; i++) {
        if (i >= params.length) {
          markers.push({ severity: monaco.MarkerSeverity.Warning, message: `Extra argument "${args[i].value}" - ${cmdName} takes ${params.length} argument(s)`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col, endColumn: args[i].col + args[i].value.length });
          continue;
        }
        const param = params[i]; const val = args[i].value;
        if (param.type === 'number' && isNaN(Number(val))) {
          markers.push({ severity: monaco.MarkerSeverity.Error, message: `Parameter "${param.name}" expects a number, got "${val}"`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col, endColumn: args[i].col + val.length });
        } else if (param.type === 'enum' && !param.values.includes(val)) {
          markers.push({ severity: monaco.MarkerSeverity.Error, message: `"${val}" is not valid for "${param.name}". Expected one of: ${param.values.join(', ')}`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col, endColumn: args[i].col + val.length });
        } else if (param.type === 'uid' && !isValidUID(val)) {
          markers.push({ severity: monaco.MarkerSeverity.Error, message: `Parameter "${param.name}" expects a UID or variable (e.g. %myVar), got "${val}"`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col, endColumn: args[i].col + val.length });
        } else if (param.type === 'command') {
          const nestedTokens = parseLine(val);
          if (nestedTokens.length) {
            const nestedCmdName = nestedTokens[0].value.toLowerCase();
            if (!CMDS[nestedCmdName]) {
              markers.push({ severity: monaco.MarkerSeverity.Error, message: `"${nestedCmdName}" is not a valid command`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col, endColumn: args[i].col + nestedTokens[0].value.length });
            } else {
              const nestedSpec = CMDS[nestedCmdName];
              const nestedParams = resolveParams(nestedSpec, nestedTokens);
              const nestedArgs = nestedTokens.slice(1);
              for (let j = 0; j < nestedArgs.length; j++) {
                if (j >= nestedParams.length) { markers.push({ severity: monaco.MarkerSeverity.Warning, message: `Extra argument "${nestedArgs[j].value}" for nested command "${nestedCmdName}"`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col + nestedArgs[j].col - 1, endColumn: args[i].col + nestedArgs[j].col - 1 + nestedArgs[j].value.length }); continue; }
                const np = nestedParams[j]; const nv = nestedArgs[j].value;
                if (np.type === 'number' && isNaN(Number(nv))) markers.push({ severity: monaco.MarkerSeverity.Error, message: `Nested param "${np.name}" expects a number, got "${nv}"`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col + nestedArgs[j].col - 1, endColumn: args[i].col + nestedArgs[j].col - 1 + nv.length });
                else if (np.type === 'enum' && !np.values.includes(nv)) markers.push({ severity: monaco.MarkerSeverity.Error, message: `"${nv}" is not valid for nested param "${np.name}"`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col + nestedArgs[j].col - 1, endColumn: args[i].col + nestedArgs[j].col - 1 + nv.length });
                else if (np.type === 'uid' && !isValidUID(nv)) markers.push({ severity: monaco.MarkerSeverity.Error, message: `Nested param "${np.name}" expects a UID or %variable`, startLineNumber: ln, endLineNumber: ln, startColumn: args[i].col + nestedArgs[j].col - 1, endColumn: args[i].col + nestedArgs[j].col - 1 + nv.length });
              }
              if (nestedArgs.length < nestedParams.length) {
                const missing = nestedParams.slice(nestedArgs.length).filter(p => p.default === undefined).map(p => p.name);
                if (missing.length) markers.push({ severity: monaco.MarkerSeverity.Hint, message: `Nested command missing argument(s): ${missing.join(', ')}`, startLineNumber: ln, endLineNumber: ln, startColumn: line.length + 1, endColumn: line.length + 2 });
              }
            }
          }
        }
      }
      if (args.length < params.length) {
        const missing = params.slice(args.length).filter(p => p.default === undefined).map(p => p.name);
        if (missing.length) markers.push({ severity: monaco.MarkerSeverity.Hint, message: `Missing argument(s): ${missing.join(', ')}`, startLineNumber: ln, endLineNumber: ln, startColumn: line.length + 1, endColumn: line.length + 2 });
      }
    }
    monaco.editor.setModelMarkers(model, LANG, markers);
    updateErrorPanel(markers, editorRef);
  }

  const initialValue = [
    'create 1 part 0 0 0',
    'create 1 part 10 0 0',
    'tween 1 %obj1 2 10 0 10 0 0 0',
    'wait 1',
    'tween 1 %obj1 1.5 0 0 0 0 0 0',
    'tween 1 %obj2 3 0 0 15 0 0 0',
  ].join('\n');

  const editor = monaco.editor.create(document.getElementById('editor-wrap'), {
    value: initialValue, language: LANG, theme: 'vs-dark', fontSize: 14,
    fontFamily: 'Consolas, "Courier New", monospace', lineNumbers: 'on',
    minimap: { enabled: false }, scrollBeyondLastLine: false, renderLineHighlight: 'line',
    tabSize: 2, wordWrap: 'off', parameterHints: { enabled: true, cycle: true },
    quickSuggestions: { other: true, comments: false, strings: false },
    suggestOnTriggerCharacters: true, acceptSuggestionOnEnter: 'on',
    autoClosingBrackets: 'never', autoClosingQuotes: 'never',
    inlayHints: { enabled: 'on' },
  });

  let debounce;
  editor.onDidChangeModelContent(() => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      validate(editor.getModel(), editor);
      rebuildTimeline();
    }, 300);
  });
  validate(editor.getModel(), editor);

  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Space, () => editor.trigger('keyboard', 'editor.action.triggerSuggest', {}));
  editor.addCommand(monaco.KeyMod.Shift | monaco.KeyMod.CtrlCmd | monaco.KeyCode.Space, () => editor.trigger('keyboard', 'editor.action.triggerParameterHints', {}));

  document.getElementById('btn-export').addEventListener('click', () => {
    const content = editor.getValue();
    const blob = new Blob([content], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'script.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById('btn-import').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.txt';
    input.addEventListener('change', () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        editor.setValue(e.target.result);
        editor.setPosition({ lineNumber: 1, column: 1 });
        editor.focus();
        rebuildTimeline();
      };
      reader.readAsText(file);
    });
    input.click();
  });

  // ─── 2D PREVIEW ──────────────────────────────────────────────────────────────

  const canvas = document.getElementById('preview-canvas');
  const ctx = canvas.getContext('2d');

  const OBJ_COLORS = ['#61afef','#e06c75','#98c379','#e5c07b','#c678dd','#56b6c2','#d19a66','#ff8c69'];

  // Per-uid stable color assignment
  const uidColorMap = {};
  let uidColorIdx = 0;
  function colorForUid(uid) {
    if (!uidColorMap[uid]) {
      uidColorMap[uid] = OBJ_COLORS[uidColorIdx++ % OBJ_COLORS.length];
    }
    return uidColorMap[uid];
  }

  // State
  let animTime = 0;
  let playing = true;
  let animStartTs = null;
  let totalDur = 1;
  let objTimelines = {}; // uid -> [{t, x, z}]
  let waitEvents = [];   // [{t, duration}]
  let parsedEvents = [];

  // Parse script into a flat ordered list of events with absolute timestamps
  function parseScript(text) {
    const lines = text.split('\n');
    const events = [];
    let cursor = 0;

    for (const raw of lines) {
      const tokens = parseLine(raw);
      if (!tokens.length) continue;
      const cmd = tokens[0].value.toLowerCase();
      const args = tokens.slice(1).map(t => t.value);

      if (cmd === 'wait') {
        const dur = parseFloat(args[0]);
        if (!isNaN(dur) && dur > 0) {
          events.push({ type: 'wait', t: cursor, duration: dur });
          cursor += dur;
        }
      } else if (cmd === 'create') {
        // world type pX pY pZ
        const pX = parseFloat(args[2]);
        const pZ = parseFloat(args[4]);
        if (!isNaN(pX) && !isNaN(pZ)) {
          const uid = `__create_${events.length}`;
          events.push({ type: 'create', t: cursor, uid, x: pX, z: pZ });
        }
      } else if (cmd === 'tween') {
        // world uid duration pX pY pZ rX rY rZ
        const uid = args[1];
        const dur = parseFloat(args[2]);
        const toX = parseFloat(args[3]);
        const toZ = parseFloat(args[5]);
        if (uid && !isNaN(dur) && dur > 0 && !isNaN(toX) && !isNaN(toZ)) {
          events.push({ type: 'tween', t: cursor, uid, duration: dur, toX, toZ });
          cursor += dur;
        }
      } else if (cmd === 'move') {
        // world uid pX pY pZ rX rY rZ  — instant
        const uid = args[1];
        const toX = parseFloat(args[2]);
        const toZ = parseFloat(args[4]);
        if (uid && !isNaN(toX) && !isNaN(toZ)) {
          events.push({ type: 'move', t: cursor, uid, toX, toZ });
        }
      }
    }

    return { events, totalDuration: Math.max(cursor, 0.001) };
  }

  // Build per-object position keyframe arrays from parsed events
  function buildObjectTimelines(events) {
    const objTl = {};

    // Seed from creates
    for (const ev of events) {
      if (ev.type === 'create') {
        objTl[ev.uid] = [{ t: ev.t, x: ev.x, z: ev.z }];
      }
    }

    // Seed unknown uids from their FIRST appearance — tween implies the object
    // starts at the tween's destination (we work backwards for the first one),
    // but actually: the first tween's "from" is unknown, so we mark it as a
    // dangling start. We do a two-pass approach:
    // Pass 1: collect first-seen time per uid so we can seed correctly.
    const firstSeen = {}; // uid -> { t, fromTween: true/false }
    for (const ev of events) {
      if ((ev.type === 'tween' || ev.type === 'move') && firstSeen[ev.uid] === undefined) {
        firstSeen[ev.uid] = ev.t;
      }
    }
    // Seed: for uids not from a 'create', place a placeholder ONLY at their
    // first-referenced time. We don't know the real start position so we defer
    // — the first tween itself will supply the start keyframe below.
    for (const [uid, t] of Object.entries(firstSeen)) {
      if (!objTl[uid]) {
        // No create found — we'll let the tween loop insert its own start kf.
        objTl[uid] = [];
      }
    }

    // Apply tweens and moves in order
    for (const ev of events) {
      if (ev.type === 'tween') {
        const tl = objTl[ev.uid];
        if (!tl) continue;
        // Determine from-position: use last known keyframe if one exists before ev.t,
        // otherwise the tween start is unknown — omit a synthetic start keyframe so
        // the path begins cleanly at the tween's first point.
        const hasEarlierKf = tl.some(k => k.t <= ev.t);
        if (hasEarlierKf) {
          const fromPos = getPosAt(tl, ev.t);
          if (!tl.find(k => k.t === ev.t)) {
            tl.push({ t: ev.t, x: fromPos.x, z: fromPos.z });
          }
        } else {
          // First tween for this uid — start keyframe IS the tween's start time,
          // but we don't know the from-position. Leave no synthetic origin; just
          // add the destination. The path will start at the first known point.
          // (We add a start kf only if there's a preceding create or move.)
        }
        // Destination keyframe
        tl.push({ t: ev.t + ev.duration, x: ev.toX, z: ev.toZ });
        tl.sort((a, b) => a.t - b.t);
      } else if (ev.type === 'move') {
        const tl = objTl[ev.uid];
        if (!tl) continue;
        tl.push({ t: ev.t, x: ev.toX, z: ev.toZ });
        tl.sort((a, b) => a.t - b.t);
      }
    }

    return objTl;
  }

  // Interpolate position from a keyframe array at time t
  function getPosAt(tl, t) {
    if (!tl || !tl.length) return { x: 0, z: 0 };
    if (t <= tl[0].t) return { x: tl[0].x, z: tl[0].z };
    const last = tl[tl.length - 1];
    if (t >= last.t) return { x: last.x, z: last.z };
    for (let i = 0; i < tl.length - 1; i++) {
      if (t >= tl[i].t && t <= tl[i + 1].t) {
        const span = tl[i + 1].t - tl[i].t;
        const frac = span === 0 ? 1 : (t - tl[i].t) / span;
        return {
          x: tl[i].x + (tl[i + 1].x - tl[i].x) * frac,
          z: tl[i].z + (tl[i + 1].z - tl[i].z) * frac,
        };
      }
    }
    return { x: last.x, z: last.z };
  }

  function rebuildTimeline() {
    const text = editor.getValue();
    const parsed = parseScript(text);
    parsedEvents = parsed.events;
    totalDur = parsed.totalDuration;
    waitEvents = parsedEvents.filter(e => e.type === 'wait');
    objTimelines = buildObjectTimelines(parsedEvents);

    const scrubber = document.getElementById('preview-scrubber');
    scrubber.max = totalDur;
    scrubber.step = totalDur / 2000;

    // Don't reset animTime — keep playing where we are (clamped)
    if (animTime > totalDur) { animTime = 0; animStartTs = null; }

    drawPreview(animTime);
  }

  // ── Canvas sizing ──
  function resizeCanvas() {
    const wrap = document.getElementById('preview-canvas-wrap');
    canvas.width = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    drawPreview(animTime);
  }

  // ── Viewport: auto-fit all keyframes ──
  function computeViewport() {
    // Z is left/right (horizontal), X is up/down (vertical)
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity, any = false;
    for (const tl of Object.values(objTimelines)) {
      for (const k of tl) {
        minX = Math.min(minX, k.x); maxX = Math.max(maxX, k.x);
        minZ = Math.min(minZ, k.z); maxZ = Math.max(maxZ, k.z);
        any = true;
      }
    }
    if (!any) return { cx: 0, cz: 0, scale: 20 };
    const cx = (minX + maxX) / 2;
    const cz = (minZ + maxZ) / 2;
    const spanZ = Math.max(maxZ - minZ, 1); // Z fills canvas width
    const spanX = Math.max(maxX - minX, 1); // X fills canvas height
    const pad = 0.3;
    const scaleH = canvas.width  / (spanZ * (1 + pad * 2));
    const scaleV = canvas.height / (spanX * (1 + pad * 2));
    const scale = Math.min(scaleH, scaleV, 100, Math.max(canvas.width, canvas.height) / 2);
    return { cx, cz, scale: Math.max(scale, 4) };
  }

  // Z -> screen horizontal (left/right), X -> screen vertical (+X = up)
  function toCanvas(wx, wz, vp) {
    return {
      cx: canvas.width  / 2 + (wz - vp.cz) * vp.scale,
      cy: canvas.height / 2 - (wx - vp.cx) * vp.scale,
    };
  }

  function drawGrid(vp) {
    const W = canvas.width, H = canvas.height;
    const worldW = W / vp.scale; // Z span visible
    const worldH = H / vp.scale; // X span visible

    // Pick a nice step
    const rawStep = Math.max(worldW, worldH) / 8;
    const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    let step = mag;
    if (rawStep / mag > 5) step = mag * 5;
    else if (rawStep / mag > 2) step = mag * 2;

    // Z varies left-right -> vertical grid lines
    const startZ = Math.floor((vp.cz - worldW / 2) / step) * step;
    // X varies up-down -> horizontal grid lines
    const startX = Math.floor((vp.cx - worldH / 2) / step) * step;

    ctx.strokeStyle = '#1e1e1e';
    ctx.lineWidth = 1;
    for (let wz = startZ; wz < startZ + worldW + step; wz += step) {
      const cx = W / 2 + (wz - vp.cz) * vp.scale;
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();
    }
    for (let wx = startX; wx < startX + worldH + step; wx += step) {
      const cy = H / 2 - (wx - vp.cx) * vp.scale;
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
    }

    // Axis lines through origin
    const o = toCanvas(0, 0, vp);
    ctx.strokeStyle = '#2e2e2e';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(o.cx, 0); ctx.lineTo(o.cx, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, o.cy); ctx.lineTo(W, o.cy); ctx.stroke();

    // Grid labels: Z values along bottom, X values along left side
    ctx.fillStyle = '#333';
    ctx.font = '9px Consolas, monospace';
    ctx.textAlign = 'center';
    for (let wz = startZ; wz < startZ + worldW + step; wz += step) {
      if (Math.abs(wz) < step * 0.01) continue;
      const cx = W / 2 + (wz - vp.cz) * vp.scale;
      if (cx < 4 || cx > W - 4) continue;
      ctx.fillText(wz % 1 === 0 ? wz : wz.toFixed(1), cx, H - 3);
    }
    ctx.textAlign = 'left';
    for (let wx = startX; wx < startX + worldH + step; wx += step) {
      if (Math.abs(wx) < step * 0.01) continue;
      const cy = H / 2 - (wx - vp.cx) * vp.scale;
      if (cy < 10 || cy > H - 10) continue;
      ctx.fillText(wx % 1 === 0 ? wx : wx.toFixed(1), 3, cy + 3);
    }

    // Origin dot
    ctx.beginPath(); ctx.arc(o.cx, o.cy, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#333'; ctx.fill();

    // Axis labels
    ctx.fillStyle = '#3a3a3a';
    ctx.font = '10px Consolas, monospace';
    ctx.textAlign = 'right'; ctx.fillText('z', W - 4, H / 2 - 4); // Z goes right
    ctx.textAlign = 'left';  ctx.fillText('x', o.cx + 4, 12);     // X goes up
  }

  function drawPreview(t) {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);

    const vp = computeViewport();
    const uids = Object.keys(objTimelines);

    if (!uids.length) {
      ctx.fillStyle = '#333';
      ctx.font = '11px Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('add create / tween / move commands', W / 2, H / 2);
      return;
    }

    drawGrid(vp);

    // Check if currently in a wait
    const activeWait = waitEvents.find(w => t >= w.t && t < w.t + w.duration);

    // Draw ghost paths (full trajectory dashed)
    ctx.setLineDash([3, 5]);
    for (const uid of uids) {
      const tl = objTimelines[uid];
      if (tl.length < 2) continue;
      ctx.strokeStyle = colorForUid(uid) + '33';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < tl.length; i++) {
        const p = toCanvas(tl[i].x, tl[i].z, vp);
        i === 0 ? ctx.moveTo(p.cx, p.cy) : ctx.lineTo(p.cx, p.cy);
      }
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // Draw active tween segment
    for (const uid of uids) {
      const tl = objTimelines[uid];
      for (let i = 0; i < tl.length - 1; i++) {
        if (t > tl[i].t && t <= tl[i + 1].t) {
          const a = toCanvas(tl[i].x, tl[i].z, vp);
          const b = toCanvas(tl[i + 1].x, tl[i + 1].z, vp);
          ctx.strokeStyle = colorForUid(uid) + 'bb';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(a.cx, a.cy);
          ctx.lineTo(b.cx, b.cy);
          ctx.stroke();
        }
      }
    }

    // Draw keyframe dots on path
    for (const uid of uids) {
      const tl = objTimelines[uid];
      const col = colorForUid(uid);
      for (const k of tl) {
        const p = toCanvas(k.x, k.z, vp);
        ctx.beginPath(); ctx.arc(p.cx, p.cy, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = col + '55';
        ctx.fill();
      }
    }

    // Draw current object positions
    for (const uid of uids) {
      const tl = objTimelines[uid];
      const pos = getPosAt(tl, t);
      const cp = toCanvas(pos.x, pos.z, vp);
      const col = colorForUid(uid);
      const label = uid.startsWith('__create_') ? `obj${parseInt(uid.slice(9)) + 1}` : uid;

      // Outer ring
      ctx.beginPath(); ctx.arc(cp.cx, cp.cy, 7, 0, Math.PI * 2);
      ctx.fillStyle = col + '22'; ctx.fill();

      // Main dot
      ctx.beginPath(); ctx.arc(cp.cx, cp.cy, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.fill();
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
      ctx.stroke();

      // Label
      ctx.font = '10px Consolas, monospace';
      ctx.fillStyle = col;
      ctx.textAlign = 'left';
      ctx.fillText(label, cp.cx + 9, cp.cy - 5);

      // Coord
      ctx.font = '9px Consolas, monospace';
      ctx.fillStyle = '#555';
      ctx.fillText(`z:${pos.z.toFixed(1)} x:${pos.x.toFixed(1)}`, cp.cx + 9, cp.cy + 5);
    }

    // Wait overlay: semi-transparent banner at bottom
    if (activeWait) {
      const remaining = (activeWait.t + activeWait.duration - t).toFixed(2);
      const elapsed = (t - activeWait.t).toFixed(2);
      const progress = (t - activeWait.t) / activeWait.duration;

      // Bottom banner
      ctx.fillStyle = 'rgba(229,192,123,0.07)';
      ctx.fillRect(0, H - 28, W, 28);
      ctx.strokeStyle = 'rgba(229,192,123,0.2)';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(0, H - 28); ctx.lineTo(W, H - 28); ctx.stroke();

      // Progress bar
      ctx.fillStyle = 'rgba(229,192,123,0.15)';
      ctx.fillRect(0, H - 4, W * progress, 4);
      ctx.fillStyle = 'rgba(229,192,123,0.5)';
      ctx.fillRect(0, H - 4, W * progress, 4);

      ctx.font = '10px Consolas, monospace';
      ctx.fillStyle = '#e5c07b';
      ctx.textAlign = 'left';
      ctx.fillText(`wait  ${remaining}s remaining`, 8, H - 10);
    }

    // Timeline scrubber timeline bar at very top (2px) showing wait regions
    ctx.fillStyle = '#1e1e1e';
    ctx.fillRect(0, 0, W, 3);
    for (const w of waitEvents) {
      const x1 = (w.t / totalDur) * W;
      const x2 = ((w.t + w.duration) / totalDur) * W;
      ctx.fillStyle = 'rgba(229,192,123,0.35)';
      ctx.fillRect(x1, 0, x2 - x1, 3);
    }
    // Playhead on timeline bar
    const headX = (t / totalDur) * W;
    ctx.fillStyle = '#61afef';
    ctx.fillRect(headX - 0.5, 0, 1.5, 3);
  }

  // ── Playback ──
  function animLoop(ts) {
    if (playing) {
      if (animStartTs === null) animStartTs = ts - animTime * 1000;
      animTime = (ts - animStartTs) / 1000;
      if (animTime >= totalDur) {
        animTime = 0;
        animStartTs = ts;
      }
      const scrubber = document.getElementById('preview-scrubber');
      scrubber.value = animTime;
      document.getElementById('preview-time').textContent =
        animTime.toFixed(1) + 's / ' + totalDur.toFixed(1) + 's';
      drawPreview(animTime);
    }
    requestAnimationFrame(animLoop);
  }

  // Controls
  const btnPlay = document.getElementById('btn-play');
  const btnReset = document.getElementById('btn-reset-anim');
  const scrubber = document.getElementById('preview-scrubber');
  const timeLabel = document.getElementById('preview-time');

  btnPlay.addEventListener('click', () => {
    playing = !playing;
    btnPlay.textContent = playing ? 'pause' : 'play';
    btnPlay.classList.toggle('active', playing);
    if (playing) animStartTs = null;
  });

  btnReset.addEventListener('click', () => {
    animTime = 0;
    animStartTs = null;
    scrubber.value = 0;
    timeLabel.textContent = '0.0s / ' + totalDur.toFixed(1) + 's';
    drawPreview(0);
  });

  scrubber.addEventListener('input', () => {
    playing = false;
    btnPlay.textContent = 'play';
    btnPlay.classList.remove('active');
    animTime = parseFloat(scrubber.value);
    timeLabel.textContent = animTime.toFixed(1) + 's / ' + totalDur.toFixed(1) + 's';
    drawPreview(animTime);
  });

  // ── Panel resize ──
  const resizeHandle = document.getElementById('preview-resize');
  const previewPanel = document.getElementById('preview-panel');
  let rDragging = false, rStartX = 0, rStartW = 0;

  resizeHandle.addEventListener('mousedown', e => {
    rDragging = true; rStartX = e.clientX; rStartW = previewPanel.offsetWidth;
    resizeHandle.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!rDragging) return;
    const newW = Math.max(200, Math.min(600, rStartW + (rStartX - e.clientX)));
    previewPanel.style.width = newW + 'px';
    resizeCanvas(); editor.layout();
  });
  document.addEventListener('mouseup', () => {
    if (rDragging) { rDragging = false; resizeHandle.classList.remove('dragging'); }
  });

  window.addEventListener('resize', () => { resizeCanvas(); editor.layout(); });

  // ── Init ──
  setTimeout(() => {
    resizeCanvas();
    rebuildTimeline();
    requestAnimationFrame(animLoop);
  }, 150);
});
</script>
</body>
</html>
