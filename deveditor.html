  });
  document.getElementById('save-snippet-cancel').addEventListener('click', closeSaveSnippetDialog);
  document.getElementById('save-snippet-cancel-x').addEventListener('click', closeSaveSnippetDialog);
  document.getElementById('save-snippet-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('save-snippet-confirm').click(); }
    if (e.key === 'Escape') { e.preventDefault(); closeSaveSnippetDialog(); }
  });
  document.getElementById('save-snippet-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('save-snippet-overlay')) closeSaveSnippetDialog();
  });

  function downloadSnippet(snip) {
    const blob = new Blob([snip.content], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = snip.name + '.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function renderSnippetsList() {
    const list = loadSnippets();
    const container = document.getElementById('snippets-list');
    if (!list.length) {
      container.innerHTML = '<div id="snippets-empty">No saved snippets yet. Select some lines in the editor, right-click, and choose "Save Snippet".</div>';
      return;
    }
    container.innerHTML = list.map(s => `
      <div class="snippet-row" data-id="${s.id}">
        <span class="snippet-name" title="${escapeHtml(s.name)}">${escapeHtml(s.name)}</span>
        <button class="snippet-btn primary" data-action="paste">Paste in current window</button>
        <button class="snippet-btn" data-action="export">Export</button>
        <button class="snippet-btn danger" data-action="delete">Delete</button>
      </div>`).join('');

    container.querySelectorAll('.snippet-row').forEach(row => {
      const id = row.dataset.id;
      row.querySelector('[data-action="paste"]').addEventListener('click', () => {
        const snip = loadSnippets().find(s => s.id === id);
        if (!snip) return;
        const sel = editor.getSelection();
        editor.executeEdits('paste-snippet', [{ range: sel, text: snip.content }]);
        editor.focus();
      });
      row.querySelector('[data-action="export"]').addEventListener('click', () => {
        const snip = loadSnippets().find(s => s.id === id);
        if (snip) downloadSnippet(snip);
      });
      row.querySelector('[data-action="delete"]').addEventListener('click', () => {
        saveSnippetsList(loadSnippets().filter(s => s.id !== id));
        renderSnippetsList();
      });
    });
  }

  document.getElementById('btn-snippets').addEventListener('click', () => {
    renderSnippetsList();
    document.getElementById('snippets-overlay').classList.add('open');
  });
  document.getElementById('snippets-close').addEventListener('click', () => document.getElementById('snippets-overlay').classList.remove('open'));
  document.getElementById('snippets-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('snippets-overlay')) document.getElementById('snippets-overlay').classList.remove('open');
  });

  document.getElementById('snippets-export-all').addEventListener('click', () => {
    loadSnippets().forEach(downloadSnippet);
  });

  document.getElementById('snippets-import').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.txt'; input.multiple = true;
    input.addEventListener('change', () => {
      const files = Array.from(input.files);
      if (!files.length) return;
      const list = loadSnippets();
      let loaded = 0;
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          list.push({ id: makeSnippetId(), name: file.name.replace(/\.txt$/i, ''), content: e.target.result, createdAt: Date.now() });
          loaded++;
          if (loaded === files.length) { saveSnippetsList(list); renderSnippetsList(); }
        };
        reader.readAsText(file);
      });
    });
    input.click();
  });

  // ── Session persistence via localStorage ──
  const STORAGE_KEY = 'cmdEditor_session';

  function saveSession() {
    try {
      // Read order from DOM so drag-reordered tabs are saved correctly
      const tabOrder = Array.from(tabsList.querySelectorAll('.tab')).map(el => el.dataset.id);
      const session = {
        activeTabId,
        tabOrder,
        tabs: Object.fromEntries(
          Object.entries(tabs).map(([id, tab]) => [id, { name: tab.name, content: tab.model.getValue() }])
        ),
        tabCounter,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
    } catch (e) { /* storage full or unavailable */ }
  }

  function restoreTab(id, name, content) {
    const model = monaco.editor.createModel(content || '', LANG);
    tabs[id] = { name, model, viewState: null };

    const tabEl = document.createElement('div');
    tabEl.className = 'tab';
    tabEl.dataset.id = id;

    const nameEl = document.createElement('span');
    nameEl.className = 'tab-name';
    nameEl.textContent = name;
    nameEl.title = 'Double-click to rename';

    const closeEl = document.createElement('span');
    closeEl.className = 'tab-close';
    closeEl.innerHTML = '&#x2715;';
    closeEl.title = 'Close tab';

    tabEl.appendChild(nameEl);
    tabEl.appendChild(closeEl);
    tabsList.appendChild(tabEl);

    tabEl.addEventListener('click', (e) => { if (e.target === closeEl) return; switchTab(id); });
    nameEl.addEventListener('dblclick', () => startRename(id, tabEl, nameEl));
    closeEl.addEventListener('click', () => closeTab(id));
    attachDragHandlers(tabEl);

    model.onDidChangeContent(() => {
      clearTimeout(tabs[id].debounce);
      tabs[id].debounce = setTimeout(() => {
        if (activeTabId === id) { validate(model, editor); updateOutline(); }
        saveSession();
      }, 250);
    });
  }

  function loadSession() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const session = JSON.parse(raw);
      if (!session.tabs || !session.tabOrder || !session.tabOrder.length) return false;

      tabCounter = session.tabCounter || 0;

      session.tabOrder.forEach(id => {
        const saved = session.tabs[id];
        if (saved) restoreTab(id, saved.name, saved.content);
      });

      const restoreId = session.activeTabId && tabs[session.activeTabId]
        ? session.activeTabId
        : session.tabOrder[session.tabOrder.length - 1];
      switchTab(restoreId);
      return true;
    } catch (e) { return false; }
  }

  // ── Boot: restore session or start fresh ──
  if (!loadSession()) {
    createTab('commands1', 'create 1 part 1 1 1');
  }
});
</script>
